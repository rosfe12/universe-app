<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>CAMVERSE</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(99, 102, 241, 0.28), transparent 32%),
          #0f172a;
        color: #f8fafc;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "SF Pro Text",
          "Apple SD Gothic Neo",
          "Noto Sans KR",
          "Segoe UI",
          sans-serif;
      }

      .shell {
        width: min(100%, 420px);
        padding: 24px;
      }

      .card {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 28px;
        background: rgba(15, 23, 42, 0.82);
        backdrop-filter: blur(16px);
        padding: 28px 24px;
        box-shadow: 0 30px 80px -40px rgba(15, 23, 42, 0.9);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(129, 140, 248, 0.35);
        color: #c7d2fe;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.24em;
      }

      h1 {
        margin: 18px 0 10px;
        font-size: 30px;
        line-height: 1;
        letter-spacing: -0.05em;
      }

      p {
        margin: 0;
        color: #94a3b8;
        font-size: 14px;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <span class="badge">CAMVERSE</span>
        <h1>앱을 준비 중입니다</h1>
        <p>네트워크 연결 후 CAMVERSE를 다시 열면 최신 캠퍼스 화면이 바로 열립니다.</p>
      </section>
    </main>
  </body>
</html>
